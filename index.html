        // COMPONENT TANDA TANGAN (CANVAS DRAWING PAD)
        // ==========================================
        function SignaturePad({ onSave, savedImage, readOnly, placeholder }) {
            const canvasRef = React.useRef(null);
            const isDrawing = React.useRef(false);

            React.useEffect(() => {
                if (canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    ctx.strokeStyle = '#020617'; 
                    ctx.lineWidth = 2.5;
                    ctx.lineCap = 'round';
                }
            }, [readOnly, savedImage]);
            
            const startDrawing = (e) => {
                if (readOnly) return;
                isDrawing.current = true;
                draw(e);
            };

            const stopDrawing = () => {
                if (readOnly) return;
                isDrawing.current = false;
                if (canvasRef.current) {
                    onSave(canvasRef.current.toDataURL());
                }
            };
            
            const draw = (e) => {
                if (!isDrawing.current || readOnly) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                ctx.lineTo(clientX - rect.left, clientY - rect.top);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(clientX - rect.left, clientY - rect.top);
            };

            const clearCanvas = () => {
                if (canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.beginPath();
                    onSave('');
                }
            };
            
            if (savedImage) {
                return (
                    <div className="flex flex-col items-center justify-center p-1 bg-white rounded-lg border border-slate-200">
                        <img src={savedImage} className="w-40 h-20 object-contain mix-blend-multiply" alt="Tanda tangan" />
                        {!readOnly && (
                            <button onClick={() => onSave('')} className="text-[10px] text-red-600 font-medium mt-1 print-hidden hover:underline focus:outline-none">Hapus TTD ✕</button>
                        )}
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center w-full max-w-[200px]">
                    <canvas 
                        ref={canvasRef}
                        width="200" 
                        height="90"
                        onMouseDown={startDrawing}
                        onMouseUp={stopDrawing}
                        onMouseMove={draw}
                        onMouseOut={stopDrawing}
                        onTouchStart={startDrawing}
                        onTouchEnd={stopDrawing}
                        onTouchMove={draw}
                        className="bg-white border-2 border-dashed border-slate-300 rounded-lg cursor-crosshair touch-none max-w-full hover:border-slate-400 transition-colors"
                    />
                    <div className="flex gap-3 mt-1.5 print-hidden justify-between w-full px-1">
                        <span className="text-[10px] text-slate-400 italic font-medium">{placeholder || 'Goreskan TTD'}</span>
                        {!readOnly && <button type="button" onClick={clearCanvas} className="text-[10px] text-red-500 font-semibold hover:text-red-700 transition-colors">Clear</button>}
                    </div>
                </div>
            );
        }

                    const p = parseFloat(hmData[`pagi_${u.id}`]);
                    const m = parseFloat(hmData[`malam_${u.id}`]);
                    
                    if(!isNaN(p) && !isNaN(m) && m < p) {
                        valid = false;
                    }
                    
                    if (!isNaN(p) || !isNaN(m)) {
                        adaDataDikirim = true;
                        const tgl = hmData[`tgl_${u.id}`] || getLocalDateString();
                        const ket = hmData[`ket_${u.id}`] || "";
                        
                        formData.append(`tgl_${u.id}`, tgl);
                        formData.append(`pagi_${u.id}`, !isNaN(p) ? p : "");
                        formData.append(`malam_${u.id}`, !isNaN(m) ? m : "");
                        formData.append(`ket_${u.id}`, ket);
                    }
                });

                    return;

                    alert("⚠️ Peringatan: Tidak ada data Hour Meter yang diisi.");

                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; 
                            const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scaleSize;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                            setSys2Checks(prev => {
                                const updated = [...prev];
                                updated[idx] = { ...updated[idx], img: compressedBase64 };
                                return updated;
                            });
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }

                                                <div className="flex border-b border-slate-200 pb-1.5 items-center">
                                                    <span className="w-24 text-slate-500 font-bold uppercase shrink-0">WAKTU CEK</span><span className="mr-1">:</span>
                                                    {sys2ReadOnly ? <span className="font-bold text-slate-800">{sys2Meta.jam} WITA</span> : <input type="time" value={sys2Meta.jam} onChange={e=>setSys2Meta({...sys2Meta, jam: e.target.value})} className="flex-1 bg-transparent font-bold text-slate-900 outline-none w-full" />}
                                                </div>
                                            </div>
                                            <div className="sm:col-span-2 flex border-b border-slate-200 pb-1.5 items-center">
                                                <span className="w-24 text-slate-500 font-bold uppercase shrink-0">INSPECTED BY</span><span className="mr-1">:</span>
                                                {sys2ReadOnly ? <span className="font-black text-slate-900 bg-slate-200 px-2 py-0.5 rounded">{sys2Meta.inspectedBy}</span> : <input type="text" value={sys2Meta.inspectedBy} onChange={e=>setSys2Meta({...sys2Meta, inspectedBy: e.target.value})} placeholder="Ketik nama pemeriksa lapangan..." className="flex-1 bg-transparent font-semibold text-slate-800 placeholder-slate-400 outline-none w-full" />}
                                            </div>
                                        </div>

                                        <div className="border border-slate-200 rounded-xl overflow-hidden shadow-xs mb-6">
                                            <div className="overflow-x-auto custom-scrollbar">
                                                <table className="w-full text-xs text-left border-collapse table-fixed min-w-[600px] bg-white">
                                                    <thead className="bg-slate-900 text-white font-bold text-[10px] uppercase tracking-wider">
                                                        <tr>
                                                            <th className="w-[6%] text-center p-3 border border-slate-400">NO</th>
                                                            <th className="w-[66%] p-3 border border-slate-400">ITEM INSPEKSI </th>
                                                            <th className="w-[14%] text-center p-3 bg-emerald-800 text-white border border-slate-400">SESUAI</th>
                                                            <th className="w-[14%] text-center p-3 bg-red-800 text-white border border-slate-400">TIDAK</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-200 text-slate-900">
                                                        {(weeklyLibrary[sys2Area] || []).map((desc, idx) => {
                                                            const checkVal = sys2Checks[idx]?.val || '';
                                                            const checkImg = sys2Checks[idx]?.img || '';
                                                            return (
                                                                <tr key={idx} className={`hover:bg-slate-50/50 transition-colors ${checkVal=='ya'?'bg-emerald-50/30':''} ${checkVal=='tdk'?'bg-red-50/30':''}`}>
                                                                    <td className="p-3 text-center font-bold text-red-600 border border-slate-300">{idx + 1}</td>
                                                                    <td className="p-3 border border-slate-300 space-y-2">
                                                                        <div className="font-semibold text-slate-800 leading-relaxed">{desc}</div>
                                                                        <div className="block w-full">
                                                                            {checkImg ? (
                                                                                <div className="relative inline-block w-full max-w-[260px] sm:max-w-xs mt-1">
                                                                                    <img src={checkImg} className="w-full h-auto max-h-[180px] rounded-lg border border-slate-200 shadow-sm object-contain bg-slate-50 p-0.5 mix-blend-multiply" alt="Evidence" />
                                                                                    {!sys2ReadOnly && (
                                                                                        <button type="button" onClick={() => setSys2Checks(prev => { const u = [...prev]; u[idx].img=''; return u; })} className="absolute -top-1.5 -right-1.5 bg-red-600 text-white p-1 rounded-full text-[9px] hover:bg-red-700 font-bold print-hidden shadow-sm shadow-black/40 w-5 h-5 flex items-center justify-center">✕</button>
                                                                                    )}
                                                                                </div>
                                                                            ) : (
                                                                                !sys2ReadOnly && (
                                                                                    <label className="inline-flex items-center gap-1.5 px-2.5 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-200 rounded-lg text-[9px] font-bold cursor-pointer print-hidden transition-colors mt-1 shadow-2xs">
                                                                                        <span>📷</span> <span>Lampirkan Kamera / File</span>
                                                                                        <input type="file" accept="image/*" className="hidden" onChange={(e) => handleSys2Photo(idx, e)} />
                                                                                    </label>
                                                                                )
                                                                            )}
                                                                        </div>
                                                                    </td>
                                                                    <td className="p-3 text-center border border-slate-300">
                                                                        <button type="button" disabled={sys2ReadOnly} onClick={() => handleSys2CheckVal(idx, 'ya')} className={`w-6 h-6 rounded-lg border-2 font-black text-xs mx-auto flex items-center justify-center transition-all ${checkVal==='ya'?'bg-emerald-600 border-emerald-600 text-white shadow-xs':'bg-white border-slate-200 hover:border-slate-300'}`}>
                                                                            {checkVal === 'ya' && '✓'}
                                                                        </button>
                                                                    </td>
                                                                    <td className="p-3 text-center border border-slate-300">
                                                                        <button type="button" disabled={sys2ReadOnly} onClick={() => handleSys2CheckVal(idx, 'tdk')} className={`w-6 h-6 rounded-lg border-2 font-black text-xs mx-auto flex items-center justify-center transition-all ${checkVal==='tdk'?'bg-red-600 border-red-600 text-white shadow-xs':'bg-white border-slate-200 hover:border-slate-300'}`}>
                                                                            {checkVal === 'tdk' && '✕'}
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                        <div className="mb-6 w-full no-black-pdf">
                                            <div className="flex justify-between items-center mb-3">
                                                <h3 className="font-extrabold text-red-600 text-xs uppercase tracking-wider font-mono flex items-center gap-1">⚠️ TEMUAN LAPANGAN & TINDAKAN KOREKTIF</h3>
                                                {!sys2ReadOnly && (
                                                    <button type="button" onClick={addSys2FindingRow} className="bg-slate-900 text-white px-3 py-1.5 rounded-xl text-[10px] font-extrabold print-hidden hover:bg-slate-800 shadow-sm transition-colors">➕ Baris Temuan</button>
                                                )}
                                            </div>
                                            
                                            <div className="overflow-x-auto custom-scrollbar">
                                                <table className="w-full text-xs text-left border-collapse border border-slate-200 bg-white min-w-[550px] rounded-xl overflow-hidden shadow-2xs">
                                                    <thead className="bg-slate-100 text-slate-700 font-bold text-[10px] uppercase tracking-wider">
                                                        <tr>
                                                            <th className="border border-slate-200 p-2.5 w-[6%] text-center">NO</th>
                                                            <th className="border border-slate-200 p-2.5 w-[64%]">DESKRIPSI TEMUAN / TINDAKAN PERBAIKAN</th>
                                                            <th className="border border-slate-200 p-2.5 w-[30%]">PIC & TARGET CLOSING</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="text-slate-900 align-top divide-y divide-slate-200">
                                                        {sys2FindingsList.map((row, index) => (
                                                            <tr key={row.id}>
                                                                <td className="border border-slate-200 p-2.5 text-center font-bold text-slate-500 bg-slate-50/50">{index + 1}</td>
                                                                
                                                                <td className="border border-slate-200 p-2.5 space-y-2">
                                                                    <div className="flex flex-col gap-2">
                                                                        {sys2ReadOnly ? (
                                                                            <div className="p-2 border border-slate-200 rounded-lg min-h-[45px] bg-slate-50 font-normal whitespace-pre-wrap text-[11px] text-slate-700">{row.temuan || "(Tidak ada temuan)"}</div>
                                                                        ) : (
                                                                            <textarea rows="2" value={row.temuan} onChange={e => updateSys2FindingRow(row.id, 'temuan', e.target.value)} className="w-full border border-slate-300 focus:border-slate-500 rounded-lg p-2 outline-none text-xs text-slate-800 bg-white transition-colors" placeholder="Uraian Deviasi/Temuan K3 Khusus..." />
                                                                        )}
                                                                        {sys2ReadOnly ? (
                                                                            row.perbaikan && <div className="p-2 border border-blue-200 rounded-lg min-h-[45px] bg-blue-50/30 whitespace-pre-wrap text-[11px] font-medium text-slate-800">{row.perbaikan}</div>
                                                                        ) : (
                                                                            <textarea rows="2" value={row.perbaikan} onChange={e => updateSys2FindingRow(row.id, 'perbaikan', e.target.value)} className="w-full border border-blue-300 focus:border-blue-500 rounded-lg p-2 outline-none text-xs text-slate-800 bg-white transition-colors" placeholder="Rencana Aksi / Tindakan Perbaikan Masalah..." />
                                                                        )}
                                                                    </div>
                                                                </td>

                                                                <td className="border border-slate-200 p-2.5 bg-slate-50/30">
                                                                    <div className="flex flex-col gap-2">
                                                                        {sys2ReadOnly ? (
                                                                            <div className="p-1.5 border border-slate-200 rounded-lg bg-white font-bold text-slate-800 text-[11px]">{row.pic || "—"}</div>
                                                                        ) : (
                                                                            <input type="text" value={row.pic} onChange={e => updateSys2FindingRow(row.id, 'pic', e.target.value)} placeholder="PIC Penanggung Jawab" className="w-full border border-slate-300 rounded-lg p-1.5 text-xs bg-white text-slate-800 outline-none focus:border-slate-500" />
                                                                        )}
                                                                        {sys2ReadOnly ? (
                                                                            <div className="p-1.5 border border-slate-200 rounded-lg bg-white text-slate-600 font-mono text-[11px]">{row.target || "—"}</div>
                                                                        ) : (
                                                                            <input type="date" value={row.target} onChange={e => updateSys2FindingRow(row.id, 'target', e.target.value)} className="w-full border border-slate-300 rounded-lg p-1.5 text-xs bg-white text-slate-800 outline-none focus:border-slate-500" />
                                                                        )}
                                                                        {!sys2ReadOnly && sys2FindingsList.length > 1 && (
                                                                            <button type="button" onClick={() => removeSys2FindingRow(row.id)} className="w-full text-center text-red-600 font-bold p-1 bg-red-50 hover:bg-red-100 rounded-lg border border-red-200 text-[10px] transition-colors mt-1 print-hidden">Eliminasi Baris</button>
                                                                        )}
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                        {/* TANDA TANGAN DENGAN PAGE BREAK */}
                                        <div className="print:block print:w-full break-before-page print:mt-10">
                                            <div className="border border-slate-200 rounded-xl grid grid-cols-1 sm:grid-cols-3 divide-y sm:divide-y-0 sm:divide-x divide-slate-200 text-center bg-slate-50/50 no-black-pdf gap-y-4 sm:gap-y-0 p-1.5 break-inside-avoid">
                                                
                                                {/* TANDA TANGAN INSPEKTOR */}
                                                <div className="p-3 flex flex-col justify-between items-center min-h-[160px] no-black-pdf">
                                                    <span className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">DIINSPEKSI OLEH</span>
                                                    <SignaturePad 
                                                        savedImage={sys2Sigs.sigInspector} 
                                                        onSave={(img) => setSys2Sigs({...sys2Sigs, sigInspector: img})} 
                                                        readOnly={sys2ReadOnly} 
                                                        placeholder="Inspektor SCM" 
                                                    />
                                                    <div className="w-full">
                                                        {sys2ReadOnly ? (
                                                            <div className="font-bold text-xs text-slate-800">{sys2Sigs.nameInspector}</div>
                                                        ) : (
                                                            <input type="text" value={sys2Sigs.nameInspector} onChange={e=>setSys2Sigs({...sys2Sigs, nameInspector: e.target.value})} placeholder="Ketik Nama Inspektor" className="w-full text-center font-bold text-slate-900 text-xs border-b border-slate-300 bg-white p-1 rounded-md outline-none focus:border-slate-500" />
                                                        )}
                                                        <div className="text-[9px] text-slate-500 font-medium uppercase mt-0.5">SCM Inspector</div>
                                                    </div>
                                                </div>

                                                {/* TANDA TANGAN SPV */}
                                                <div className="p-3 flex flex-col justify-between items-center min-h-[160px] no-black-pdf">
                                                    <span className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">MENGETAHUI</span>
                                                    {sys2ActiveId ? (
                                                        <SignaturePad 
                                                            savedImage={sys2Sigs.sigSpv} 
                                                            onSave={(img) => setSys2Sigs({...sys2Sigs, sigSpv: img})} 
                                                            readOnly={['Pending HOD', 'Approved'].includes(sys2Records.find(x => x.id === sys2ActiveId)?.status)} 
                                                            placeholder="Supervisor SCM"
                                                        />
                                                    ) : (
                                                        <div className="text-[10px] font-semibold text-amber-600 bg-amber-50 px-3 py-2 border border-amber-200 rounded-xl my-auto italic">🔒 </div>
                                                    )}
                                                    <div className="w-full px-1">
                                                        {sys2ActiveId ? (
                                                            ['Pending HOD', 'Approved'].includes(sys2Records.find(x => x.id === sys2ActiveId)?.status) ? (
                                                                <div className="font-bold text-xs text-slate-800">{sys2Sigs.nameSpv || '---'}</div>
                                                            ) : (
                                                                <input type="text" value={sys2Sigs.nameSpv} onChange={e=>setSys2Sigs({...sys2Sigs, nameSpv: e.target.value})} placeholder="Ketik Nama SPV" className="w-full text-center font-bold text-slate-900 text-xs border-b border-slate-300 bg-white p-1 rounded-md outline-none focus:border-slate-500" />
                                                            )
                                                        ) : (
                                                            <div className="font-bold text-xs text-slate-400">---</div>
                                                        )}
                                                        <div className="text-[9px] text-slate-500 font-medium uppercase mt-0.5">SCM Supervisor</div>
                                                    </div>
                                                </div>

                                                {/* TANDA TANGAN HOD */}
                                                <div className="p-3 flex flex-col justify-between items-center min-h-[160px] no-black-pdf">
                                                    <span className="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">DISETUJUI</span>
                                                    {sys2ActiveId && sys2Records.find(x => x.id === sys2ActiveId)?.status !== 'Pending' ? (
                                                        <SignaturePad 
                                                            savedImage={sys2Sigs.sigHead} 
                                                            onSave={(img) => setSys2Sigs({...sys2Sigs, sigHead: img})} 
                                                            readOnly={sys2Records.find(x => x.id === sys2ActiveId)?.status === 'Approved'} 
                                                            placeholder="Department Head"
                                                        />
                                                    ) : (
                                                        <div className="text-[10px] font-semibold text-amber-600 bg-amber-50 px-3 py-2 border border-amber-200 rounded-xl my-auto italic">🔒 </div>
                                                    )}
                                                    <div className="w-full px-1">
                                                        {sys2ActiveId && sys2Records.find(x => x.id === sys2ActiveId)?.status !== 'Pending' ? (
                                                            sys2Records.find(x => x.id === sys2ActiveId)?.status === 'Approved' ? (
                                                                <div className="font-bold text-xs text-slate-800">{sys2Sigs.nameHead || '---'}</div>
                                                            ) : (
                                                                <input type="text" value={sys2Sigs.nameHead} onChange={e=>setSys2Sigs({...sys2Sigs, nameHead: e.target.value})} placeholder="Ketik Nama Head" className="w-full text-center font-bold text-slate-900 text-xs border-b border-slate-300 bg-white p-1 rounded-md outline-none focus:border-slate-500" />
                                                            )
                                                        ) : (
                                                            <div className="font-bold text-xs text-slate-400">---</div>
                                                        )}
                                                        <div className="text-[9px] text-slate-500 font-medium uppercase mt-0.5">SCM Department Head</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-wrap gap-3 justify-center print-hidden mb-8 px-2 relative z-10">
                                        {sys2ActiveId ? (
                                            <>
                                                <button onClick={handleSys2Action} className="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white rounded-xl text-xs font-bold uppercase tracking-wider shadow-md transition-all w-full sm:w-auto">
                                                    {sys2Records.find(x => x.id === sys2ActiveId)?.status === 'Approved' ? '🖨️ Cetak PDF Dokumen' :
                                                     sys2Records.find(x => x.id === sys2ActiveId)?.status === 'Pending HOD' ? '✔️ APPROVE HOD (SIMPAN)' :
                                                     '✔️ VALIDASI SPV (NEXT: HOD)'}
                                                </button>
                                                <button onClick={() => { 
                                                    const nextTab = sys2ActiveId ? 'verifikasi' : 'dashboard';
                                                    setSys2ActiveId(null); 
                                                    setSys2ReadOnly(false); 
                                                    resetSys2Context(); 
                                                    setActiveTab(nextTab);
                                                }} className="px-6 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider shadow-xs transition-all w-full sm:w-auto">Kembali</button>
                                            </>
                                        ) : (
                                            <>
                                                <button disabled={isSaving} onClick={saveSys2ToPool} className={`bg-orange-600 text-white text-xs font-black uppercase tracking-wider px-6 py-3.5 rounded-xl shadow-md transition-all w-full sm:w-auto ${isSaving ? 'opacity-50 cursor-not-allowed' : 'hover:bg-orange-700 active:scale-95'}`}>
                                                    {isSaving ? '⏳ Mengirim Arsip...' : 'SAVE'}
                                                </button>
                                                <button onClick={() => { if(confirm("Kosongkan form?")) resetSys2Context(); }} className="px-6 py-3.5 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-200 rounded-xl text-xs font-bold uppercase tracking-wider transition-all w-full sm:w-auto">Reset Form</button>
                                                <button onClick={() => { resetSys2Context(); setActiveTab('dashboard'); }} className="px-6 py-3.5 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-200 rounded-xl text-xs font-bold uppercase tracking-wider transition-all w-full sm:w-auto">Kembali</button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'verifikasi' && (
                                <div className="space-y-4 animate-fade-in relative z-10">
                                    <div className="bg-white border border-slate-200 rounded-2xl p-4 md:p-6 shadow-sm">
                                        <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
                                            <h3 className="text-slate-900 font-extrabold text-sm md:text-base tracking-tight flex items-center gap-1.5"><span>🛡️</span>  Weekly Inspeksi</h3>
                                            <button onClick={() => setActiveTab('dashboard')} className="bg-slate-200 hover:bg-slate-300 text-slate-800 text-xs font-bold px-3 py-1.5 rounded-lg transition-colors">⬅ Kembali</button>
                                        </div>

                                        <div className="overflow-x-auto custom-scrollbar">
                                            <table className="w-full text-xs text-left border-collapse min-w-[700px]">
                                                <thead>
                                                    <tr className="bg-slate-50 text-slate-500 font-extrabold uppercase text-[10px] tracking-wider border-b border-slate-200">
                                                        <th className="p-3.5">Tanggal / Jam</th>
                                                        <th className="p-3.5">Kode Registrasi Dokumen</th>
                                                        <th className="p-3.5">Fasilitas / Lokasi</th>
                                                        <th className="p-3.5">Inspektor Penanggung Jawab</th>
                                                        <th className="p-3.5">Status</th>
                                                        <th className="p-3.5 text-center">Dokumen</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 font-medium text-slate-700">
                                                    {sys2Records.length === 0 ? (
                                                        <tr><td colSpan="6" className="text-center p-12 text-slate-500 font-medium italic">Tidak ada berkas laporan masuk mingguan di database online.</td></tr>
                                                    ) : (
                                                        sys2Records.map(rec => (
                                                            <tr key={rec.id} className="hover:bg-slate-50/80 cursor-pointer transition-colors" onClick={() => openSys2Record(rec)}>
                                                                <td className="p-3.5 font-mono text-slate-500 text-[11px]">{rec.tanggal} • {rec.jam}</td>
                                                                <td className="p-3.5 font-extrabold text-red-600 font-mono text-[11px]">{rec.docNo}</td>
                                                                <td className="p-3.5 font-bold text-slate-900 uppercase truncate max-w-[150px]">{rec.area}</td>
                                                                <td className="p-3.5 font-semibold text-slate-600 truncate max-w-[120px]">{rec.inspectedBy}</td>
                                                                <td className="p-3.5">
                                                                    <span className={`px-2.5 py-0.5 rounded-full text-[9px] font-black uppercase border ${
                                                                        rec.status === 'Approved' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 
                                                                        rec.status === 'Pending HOD' ? 'bg-blue-100 text-blue-700 border-blue-200' : 
                                                                        'bg-amber-100 text-amber-700 border-amber-200'
                                                                    }`}>
                                                                        {rec.status || 'Pending'}
                                                                    </span>
                                                                </td>
                                                                <td className="p-3.5 text-center flex justify-center gap-2" onClick={e=>e.stopPropagation()}>
                                                                    <button onClick={() => openSys2Record(rec)} className="bg-red-600 hover:bg-red-700 text-white text-[10px] font-bold uppercase px-3 py-1.5 rounded-xl transition-all shadow-2xs active:scale-95">Buka</button>
                                                                    <button onClick={() => deleteSys2Record(rec.id)} className="bg-slate-100 text-slate-600 text-[10px] font-medium uppercase px-3 py-1.5 rounded-xl transition-colors hover:bg-red-600 hover:text-white border border-slate-200">Hapus</button>
                                                                </td>
                                                            </tr>
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        <footer className="bg-slate-900/50 backdrop-blur-sm border-t border-slate-800 p-4 text-center text-[10px] uppercase font-bold text-slate-500 print-hidden tracking-widest relative z-10">
                            PT Batutua Tembaga Raya — SCM Facility Compliance Portal
                        </footer>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
